version: '3.8'

services:
  # ====================
  # MYSQL DATABASES
  # ====================
  
  mysql-order:
    image: mysql:8.0
    container_name: mysql-order
    environment:
      MYSQL_ROOT_PASSWORD: uptc2026
      MYSQL_DATABASE: order_db
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    volumes:
      - order_data:/var/lib/mysql
    networks:
      - service-mesh-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  mysql-customer:
    image: mysql:8.0
    container_name: mysql-customer
    environment:
      MYSQL_ROOT_PASSWORD: uptc2026
      MYSQL_DATABASE: customer_db
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3307:3306"
    volumes:
      - customer_data:/var/lib/mysql
    networks:
      - service-mesh-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  mysql-login:
    image: mysql:8.0
    container_name: mysql-login
    environment:
      MYSQL_ROOT_PASSWORD: uptc2026
      MYSQL_DATABASE: login_db
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3308:3306"
    volumes:
      - login_data:/var/lib/mysql
    networks:
      - service-mesh-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  # ====================
  # MICROSERVICES
  # ====================

  login-service:
    build: ./login
    container_name: login-service
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-login:3306/login_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT-5"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: uptc2026
    depends_on:
      mysql-login:
        condition: service_healthy
    networks:
      - service-mesh-network

  customer-service:
    build: ./customer
    container_name: customer-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-customer:3306/customer_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT-5"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: uptc2026
      LOGIN_SERVICE_URL: "http://login-service:8082"
    depends_on:
      mysql-customer:
        condition: service_healthy
      login-service:
        condition: service_started
    networks:
      - service-mesh-network

  order-service:
    build: ./order
    container_name: order-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-order:3306/order_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT-5"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: uptc2026
    depends_on:
      mysql-order:
        condition: service_healthy
    networks:
      - service-mesh-network

volumes:
  order_data:
  customer_data:
  login_data:

networks:
  service-mesh-network:
    driver: bridge
