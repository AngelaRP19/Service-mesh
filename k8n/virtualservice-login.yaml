apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: login-service
spec:
  hosts:
    - "*"
  gateways:
    - my-gateway
  http:
    - match:
        - uri:
            prefix: /api/logins
        - uri:
            prefix: /logins
      rewrite:
        uri: /api/logins
      route:
        - destination:
            host: login-service
            port:
              number: 8082
